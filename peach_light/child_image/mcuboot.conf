# MCUboot configuration for xLite Peach
#
# Upgrade strategy: overwrite-only (slot 1 → slot 0, no rollback).
# Simpler than swap, saves ~24 KB of scratch partition on nRF52832.
# Switch to CONFIG_BOOT_SWAP_USING_MOVE=y if rollback is needed later.
CONFIG_BOOT_UPGRADE_ONLY=y

# Signature type: RSA-2048 with dev_key.pem (generated at project root).
# For production, generate a fresh key and keep it out of source control.
CONFIG_BOOT_SIGNATURE_TYPE_RSA=y
CONFIG_BOOT_SIGNATURE_KEY_FILE="/Users/spount/dev/xlite2024Code/peach_light/dev_key.pem"

# Validate the primary slot image on every boot.
CONFIG_BOOT_VALIDATE_SLOT0=y

# Logging off — matches the main app's power-conscious config.
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
