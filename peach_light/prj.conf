# Logging/console/UART fully disabled - UART holds HFCLK and prevents deep sleep
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n


# SKY66112-11 FEM via MPSL - controls CTX/CRX/CPS automatically during radio events
CONFIG_MPSL=y
CONFIG_MPSL_FEM=y

# Bluetooth LE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="XLITE-PEACH"
CONFIG_BT_CTLR_TX_PWR_0=y

# PWM
CONFIG_PWM=y

# ADC
CONFIG_ADC=n
CONFIG_NRFX_SAADC=y

# Stack sizes — increased to accommodate MCUmgr SMP thread
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# OTA: MCUboot bootloader support
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="/Users/spount/dev/xlite2024Code/peach_light/dev_key.pem"

# OTA: MCUmgr / SMP over BLE
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

# OTA: Flash subsystem required for image writing
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y

# OTA: Larger BLE buffers for SMP throughput (~480 byte payloads)
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502

# OTA: Heap for MCUmgr CBOR encoding
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Ultra low power optimizations
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_BOARD_ENABLE_DCDC=y
# Use the integrated 32.768kHz crystal on BT832X1 - no calibration needed,
# allows HFCLK to shut down between radio events
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
# Disable unused buses
CONFIG_I2C=n
CONFIG_SPI=n
